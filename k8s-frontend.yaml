apiVersion: v1
kind: Namespace
metadata:
  name: ld-999
---
apiVersion: v1
kind: Service
metadata:
  name: financialcloud-frontend
  namespace: ld-999
spec:
  type: NodePort
  selector:
    app: financialcloud-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30085
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: financialcloud-frontend
  namespace: ld-999
spec:
  replicas: 1
  selector:
    matchLabels:
      app: financialcloud-frontend
  template:
    metadata:
      labels:
        app: financialcloud-frontend
    spec:
      containers:
      - name: frontend
        image: docker.io/library/financialcloud-frontend:v3.0
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: BACKEND_HOST
          value: "financialcloud-backend"
        - name: BACKEND_PORT
          value: "8001"
